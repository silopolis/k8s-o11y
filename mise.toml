file = ".mise/tasks/cluster/up"

[tasks."cluster:destroy"]
file = ".mise/tasks/cluster/destroy"

[tasks."cluster:context:list"]
file = ".mise/tasks/cluster/context/list"

[tasks."cluster:context:set"]
file = ".mise/tasks/cluster/context/set"

[tasks."cluster:context:remove"]
file = ".mise/tasks/cluster/context/remove"

