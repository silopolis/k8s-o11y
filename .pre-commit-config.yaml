  #     verbose: true
  #   # Shellcheck - FAIL on errors (block commit)
  #   - id: shellcheck
  #     name: Shell script linting
  #     entry: mise exec -- shellcheck
  #     language: system
  #     files: \.sh$
  #     stages: [pre-commit]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint-cli2.yaml"]
        files: \.(md|mdx)$
        exclude: |
          (?x)^(
              \.planning/
            | \.sessions/
            | \._build/
            | \.vendor/
          )
        verbose: true

      - id: markdownlint-cli2
        name: markdownlint-cli2 (Quarto)
        files: \.qmd$
        args: ["--config", ".markdownlint-cli2-quarto.yaml"]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        args: ["-c", ".yamllint.yaml"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        name: Shell script linting
        files: \.(sh|bash)$
        args: ["--severity=style"]

