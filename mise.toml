[settings]
env_shell_expand = true

[tools]
talosctl = "1.12.4"
kubectl = "1.35.0"
k9s = "latest"
yq = "latest"
helm = "4.0.4"
helmfile = "1.4.1"

[env]
## User overrides
_.file = ".env"
_.source = ".envrc"
## Project global variables
PROJECT_NAME = "{{ env.PROJECT_NAME | default(value=config_root | basename) }}"
PROJECT_ROOT = "{{config_root}}"
## Cluster configuration
TALOS_CLUSTER_NAME = "{{ env.TALOS_CLUSTER_NAME | default(value=env.PROJECT_NAME) }}"
TALOS_CONTEXT = "{{ env.TALOS_CONTEXT | default(value=env.TALOS_CLUSTER_NAME) }}"
TALOSHOME = "{{ env.PROJECT_ROOT}}/.talos"
TALOS_HOME = "{{ env.PROJECT_ROOT}}/.talos"
TALOSCONFIG = "{{ env.TALOS_HOME}}/talosconfig"
TALOS_STATE_DIR = "{{ env.TALOS_HOME}}/clusters"
TALOS_CONTROL_PLANE_COUNT = "{{ env.TALOS_CONTROL_PLANE_COUNT | default(value=1) }}"
TALOS_WORKER_COUNT = "{{ env.TALOS_WORKER_COUNT | default(value=2) }}"
## Kubernetes client API config
KUBECONFIG = "{{ env.PROJECT_ROOT}}/.kube/config"
## Vagrant configuration
VAGRANT_CWD = "{{ config_root }}"
VAGRANT_DEFAULT_PROVIDER = "libvirt"
VAGRANT_NO_PARALLEL = false
#VAGRANT_EXPERIMENTAL = "none_communicator"
## Helm configuration
HELM_CACHE_HOME = "{{ env.PROJECT_ROOT}}/.helm/cache"
HELM_CONFIG_HOME = "{{ env.PROJECT_ROOT}}/.helm/config"
HELM_DATA_HOME = "{{ env.PROJECT_ROOT}}/.helm/data"

[tasks.cls_up]
description = "Create Talos cluster using Docker"
run = "talosctl cluster create docker --name \"$TALOS_CLUSTER_NAME\" --state \"$TALOS_STATE_DIR\" --workers $TALOS_WORKER_COUNT"
quiet = true

[tasks.cls_destroy]
description = "Destroy Talos cluster and remove context"
run = [
  "talosctl cluster destroy --name \"$TALOS_CLUSTER_NAME\"",
  "yq -i 'del(.contexts[env(TALOS_CONTEXT)])' \"$TALOSCONFIG\" 2>/dev/null || true",
]
quiet = true

[tasks.ctx_list]
description = "List all Talos contexts and show current"
run = "talosctl config contexts"
quiet = true

[tasks.ctx_set]
description = "Set current Talos context"
usage = "arg '<context>' help='Context name to switch to'"
run = 'talosctl config context "${usage_context}"'
quiet = true

[tasks.ctx_remove]
description = "Remove a Talos context from config"
usage = "arg '<context>' help='Context name to remove'"
run = 'CONTEXT="${usage_context}" yq -i "del(.contexts[env(CONTEXT)])" "$TALOSCONFIG"'
quiet = true

[tasks.check_preflight]
description = "Run preflight checks before deployment"
run = "./scripts/preflight.sh"

[tasks.lint_md]
description = "Lint all markdown files"
run = "npx markdownlint-cli2 '**/*.md'"

[tasks.lint_md_fix]
description = "Lint and auto-fix markdown files"
run = "npx markdownlint-cli2 '**/*.md' --fix"

[tasks.lint_helmfile]
description = "Lint Helmfile configuration"
run = "helmfile -f helmfile.yaml lint"

[tasks.install_helm_plugins]
description = "Install required Helm plugins (helm-diff)"
run = """
if ! helm plugin list | grep -q diff; then
  echo "Installing helm-diff plugin..."
  helm plugin install https://github.com/databus23/helm-diff --verify=false
else
  echo "helm-diff plugin already installed"
fi
"""

[tasks.deploy_prom_crds]
description = "Sync CRDs release via Helmfile"
run = "helmfile -f helmfile.yaml -l name=kube-prometheus-stack-crds sync"

[tasks.deploy_phase1]
description = "Run complete Phase 1 deployment workflow (preflight → lint → deploy CRDs)"
run = [
  "echo '=== Phase 1: Running preflight checks ==='",
  "mise run check_preflight",
  "echo ''",
  "echo '=== Phase 1: Linting Helmfile ==='",
  "mise run lint_helmfile",
  "echo ''",
  "echo '=== Phase 1: Deploying Prometheus CRDs ==='",
  "mise run deploy_prom_crds",
  "echo ''",
  "echo '=== Phase 1 deployment complete ==='",
]

# Phase 01-02: Lint Tasks
[tasks.lint_values]
description = "Lint all Phase 01-02 values YAML files"
run = """
for file in values/kube-prometheus-stack.yaml values/prometheus.yaml values/grafana.yaml values/alertmanager.yaml; do
  echo "Linting $file..."
  yq eval '.' "$file" > /dev/null && echo "  ✓ Valid YAML"
done
"""

[tasks.lint_values_strict]
description = "Strict lint of Phase 01-02 values with Helm schema validation"
run = """
echo "Pulling kube-prometheus-stack chart for validation..."
CHART_DIR=$(mktemp -d)
helm pull prometheus-community/kube-prometheus-stack --untar --untardir "$CHART_DIR"
echo "Validating values against chart schema..."
helm lint "$CHART_DIR/kube-prometheus-stack" \
  --values values/kube-prometheus-stack.yaml \
  --values values/prometheus.yaml \
  --values values/grafana.yaml \
  --values values/alertmanager.yaml
LINT_EXIT=$?
rm -rf "$CHART_DIR"
exit $LINT_EXIT
"""

# Phase 01-02: Template/Validation Tasks
[tasks.template_stack]
description = "Template kube-prometheus-stack without deploying"
run = """
TEMPLATE_FILE=$(mktemp -t stack-template-XXXXXX.yaml)
helmfile -f helmfile.yaml -l name=kube-prometheus-stack template > "$TEMPLATE_FILE"
echo "Template written to: $TEMPLATE_FILE"
echo "Lines: $(wc -l < $TEMPLATE_FILE)"
"""

[tasks.lint_template]
description = "Lint the templated YAML for syntax errors"
run = """
TEMPLATE_FILE=$(mktemp -t stack-template-XXXXXX.yaml)
echo "Generating template..."
helmfile -f helmfile.yaml -l name=kube-prometheus-stack template > "$TEMPLATE_FILE"
echo "Linting template: $TEMPLATE_FILE"
echo "Documents: $(yq eval 'documentIndex' "$TEMPLATE_FILE" 2>/dev/null | tail -1)"
echo "Validating YAML syntax..."
yq eval '.' "$TEMPLATE_FILE" > /dev/null && echo "✓ Template is valid YAML"
rm -f "$TEMPLATE_FILE"
"""

[tasks.validate_stack]
description = "Validate stack configuration (lint + template check)"
run = [
  "mise run lint_helmfile",
  "mise run lint_values",
  "mise run template_stack",
  "mise run lint_template",
]

# Phase 01-02: Deployment Tasks
[tasks.deploy_stack]
description = "Deploy main kube-prometheus-stack (CRDs must exist)"
run = "helmfile -f helmfile.yaml -l name=kube-prometheus-stack sync"

[tasks.deploy_stack_diff]
description = "Show diff before deploying stack"
run = """
# Check and install helm-diff plugin if needed
if ! helm plugin list | grep -q diff; then
  echo "helm-diff plugin not found, installing..."
  mise run install_helm_plugins
else
  echo "helm-diff plugin already installed ✓"
fi

# Run helmfile diff
echo ""
echo "Comparing current state with desired state..."
helmfile -f helmfile.yaml -l name=kube-prometheus-stack diff
"""

[tasks.deploy_stack_apply]
description = "Apply stack with automatic confirmation"
run = "helmfile -f helmfile.yaml -l name=kube-prometheus-stack apply"

# Phase 01-02: Verification Tasks
[tasks.verify_stack]
description = "Verify Phase 01-02 deployment is healthy"
run = """
echo "=== Checking pods ==="
kubectl get pods -n monitoring
echo ""
echo "=== Checking services ==="
kubectl get svc -n monitoring
"""

[tasks.verify_retention]
description = "Verify Prometheus retention configuration"
run = """
echo "Checking Prometheus retention..."
RETENTION=$(kubectl get prometheus -n monitoring kube-prometheus-stack-prometheus -o jsonpath='{.spec.retention}' 2>/dev/null)
if [ -n "$RETENTION" ]; then
  echo "Retention: $RETENTION"
else
  echo "Retention not configured via Prometheus CR"
fi
"""

[tasks.verify_grafana]
description = "Verify Grafana NodePort is accessible"
run = """
echo "Grafana service:"
kubectl get svc kube-prometheus-stack-grafana -n monitoring
echo ""
NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
echo "Access URL: http://${NODE_IP}:30030"
echo "Get admin password: kubectl get secret kube-prometheus-stack-grafana -n monitoring -o jsonpath='{.data.admin-password}' | base64 -d"
"""

[tasks.verify_prometheus]
description = "Verify Prometheus is collecting metrics"
run = '''
echo "Getting operator pod..."
OPERATOR_POD=$(kubectl get pods -n monitoring -l app.kubernetes.io/name=kube-prometheus-stack-prometheus-operator -o jsonpath='{.items[0].metadata.name}')

echo ""
echo "=== Checking prometheus targets ==="
echo ""

# Get all targets and format as table
TARGETS_OUTPUT=$(kubectl exec -n monitoring "$OPERATOR_POD" -- wget -qO- http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/targets 2>/dev/null)

if [ -n "$TARGETS_OUTPUT" ]; then
  # Print header - fixed width columns
  echo "Prometheus Targets:"
  echo ""
  
  # Use jq to format output with proper alignment
  echo "$TARGETS_OUTPUT" | jq -r '
    .data.activeTargets[] | 
    "\(.labels.job | sub("kube-prometheus-stack-"; "kps-"))|\(.labels.instance)|\(.health)"
  ' 2>/dev/null | while IFS='|' read -r job instance health; do
    # Color code health status
    if [ "$health" = "up" ]; then
      status="✓ up"
    else
      status="✗ down"
    fi
    printf "%-35s %-22s %s\n" "$job" "$instance" "$status"
  done
  
  echo ""
  
  # Count by health status
  UP_COUNT=$(echo "$TARGETS_OUTPUT" | jq '[.data.activeTargets[] | select(.health == "up")] | length' 2>/dev/null || echo "0")
  DOWN_COUNT=$(echo "$TARGETS_OUTPUT" | jq '[.data.activeTargets[] | select(.health == "down")] | length' 2>/dev/null || echo "0")
  TOTAL_COUNT=$(echo "$TARGETS_OUTPUT" | jq '.data.activeTargets | length' 2>/dev/null || echo "0")
  
  echo "Summary: $UP_COUNT up, $DOWN_COUNT down, $TOTAL_COUNT total"
else
  echo "Failed to retrieve targets (requires jq and wget)"
fi

echo ""
echo "Checking metrics query endpoint..."
QUERY_RESULT=$(kubectl exec -n monitoring "$OPERATOR_POD" -- wget -qO- 'http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/query?query=up' 2>/dev/null | jq '.data.result | length' 2>/dev/null || echo "0")
echo "Active metrics returned: $QUERY_RESULT"
'''

[tasks.verify_alertmanager]
description = "Verify Alertmanager is operational"
run = """
echo "Checking Alertmanager status..."
OPERATOR_POD=$(kubectl get pods -n monitoring -l app.kubernetes.io/name=kube-prometheus-stack-prometheus-operator -o jsonpath='{.items[0].metadata.name}')
kubectl exec -n monitoring "$OPERATOR_POD" -- \
  wget -qO- http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093/api/v2/status 2>/dev/null | \
  jq '.cluster.status' 2>/dev/null || echo "Alertmanager check requires jq or wget"
"""

# Phase 01-02: Composite Workflow Task
[tasks.phase_02_deploy]
description = "Complete Phase 01-02 deployment workflow: validate → deploy → verify"
run = [
  "echo '=== Phase 01-02: Validating configuration ==='",
  "mise run validate_stack",
  "echo ''",
  "echo '=== Phase 01-02: Deploying stack ==='",
  "mise run deploy_stack",
  "echo ''",
  "echo '=== Phase 01-02: Waiting for pods (30s) ==='",
  "sleep 30",
  "echo ''",
  "echo '=== Phase 01-02: Verifying deployment ==='",
  "mise run verify_stack",
  "echo ''",
  "echo '=== Phase 01-02 deployment complete ==='",
]
