<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6c63ff"/></marker>
    <marker id="a-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00d4aa"/></marker>
    <marker id="a-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ffd93d"/></marker>
    <marker id="a-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ff6b6b"/></marker>
    <marker id="a-grey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4a4e6a"/></marker>
    <linearGradient id="gM" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="gDC" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#1a1d2e"/></linearGradient>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00d4aa"/><stop offset="100%" stop-color="#059669"/></linearGradient>
  </defs>

  <!-- Docker host background -->
  <rect x="20" y="220" width="920" height="306" rx="14" fill="#131522" stroke="#2a2e45" stroke-width="1.5"/>
  <text x="480" y="516" text-anchor="middle" fill="#3a3f5c" font-size="13" font-weight="700" letter-spacing=".08em">DOCKER HOST</text>

  <!-- MASTER -->
  <rect x="340" y="16" width="280" height="106" rx="12" fill="url(#gM)" style="filter:drop-shadow(0 0 8px rgba(108,99,255,.35))"/>
  <text x="480" y="46" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">prometheusMaster</text>
  <text x="480" y="66" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="11">master.prom.localhost</text>
  <text x="480" y="86" text-anchor="middle" fill="rgba(255,255,255,.55)" font-size="10.5">retention 24h  ·  rules + alerting</text>
  <text x="480" y="106" text-anchor="middle" fill="rgba(255,255,255,.45)" font-size="10">Alertmanager :9093</text>

  <!-- Federation arrows -->
  <line x1="400" y1="122" x2="220" y2="188" stroke="#6c63ff" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a-purple)"/>
  <line x1="560" y1="122" x2="740" y2="188" stroke="#6c63ff" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a-purple)"/>
  <text x="286" y="148" fill="#6c63ff" font-size="10" font-weight="600" transform="rotate(-18,286,148)">/federate</text>
  <text x="666" y="148" fill="#6c63ff" font-size="10" font-weight="600" transform="rotate(18,666,148)">/federate</text>

  <!-- DC01 -->
  <rect x="60" y="190" width="280" height="80" rx="10" fill="url(#gDC)" stroke="#6c63ff" stroke-width="1.2"/>
  <text x="200" y="218" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="700">prometheusDC01</text>
  <text x="200" y="238" text-anchor="middle" fill="#9ca3af" font-size="10.5">dc01.prom.localhost · retention 2h</text>
  <text x="200" y="258" text-anchor="middle" fill="#6c63ff" font-size="10">scrape: exporters locaux</text>

  <!-- DC02 -->
  <rect x="620" y="190" width="280" height="80" rx="10" fill="url(#gDC)" stroke="#6c63ff" stroke-width="1.2"/>
  <text x="760" y="218" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="700">prometheusDC02</text>
  <text x="760" y="238" text-anchor="middle" fill="#9ca3af" font-size="10.5">dc02.prom.localhost · retention 2h</text>
  <text x="760" y="258" text-anchor="middle" fill="#6c63ff" font-size="10">scrape: exporters locaux</text>

