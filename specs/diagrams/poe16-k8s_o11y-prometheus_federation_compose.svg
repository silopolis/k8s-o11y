  <rect x="60" y="310" width="130" height="38" rx="7" fill="#1a1d2e" stroke="#2a2e45" stroke-width="1"/>
  <text x="125" y="334" text-anchor="middle" fill="#9ca3af" font-size="10">node_exporter</text>
  <rect x="200" y="310" width="110" height="38" rx="7" fill="#1a1d2e" stroke="#2a2e45" stroke-width="1"/>
  <text x="255" y="334" text-anchor="middle" fill="#9ca3af" font-size="10">cadvisor</text>
  <rect x="60" y="358" width="130" height="38" rx="7" fill="#1a1d2e" stroke="#2a2e45" stroke-width="1"/>
  <text x="125" y="382" text-anchor="middle" fill="#9ca3af" font-size="10">process_exporter</text>

  <!-- Exporters DC02 -->
  <rect x="620" y="310" width="130" height="38" rx="7" fill="#1a1d2e" stroke="#2a2e45" stroke-width="1"/>
  <text x="685" y="334" text-anchor="middle" fill="#9ca3af" font-size="10">node_exporter</text>
  <rect x="760" y="310" width="130" height="38" rx="7" fill="#1a1d2e" stroke="#2a2e45" stroke-width="1"/>
  <text x="825" y="334" text-anchor="middle" fill="#9ca3af" font-size="10">cadvisor</text>
  <rect x="620" y="358" width="130" height="38" rx="7" fill="#1a1d2e" stroke="#2a2e45" stroke-width="1"/>
  <text x="685" y="382" text-anchor="middle" fill="#9ca3af" font-size="10">process_exporter</text>

  <!-- Traefik -->
  <rect x="370" y="236" width="160" height="52" rx="9" fill="#1a1d2e" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="450" y="259" text-anchor="middle" fill="#ffd93d" font-size="12" font-weight="700">Traefik</text>
  <text x="450" y="276" text-anchor="middle" fill="#9ca3af" font-size="9.5">:80 · /metrics</text>

  <!-- Traefik metrics arrows -->
  <line x1="370" y1="262" x2="310" y2="262" stroke="#ffd93d" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#a-yellow)"/>
  <line x1="530" y1="262" x2="620" y2="262" stroke="#ffd93d" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#a-yellow)"/>

  <!-- training-app -->
  <rect x="380" y="310" width="140" height="44" rx="8" fill="url(#gA)" opacity=".9"/>
  <text x="450" y="330" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">training-app</text>
  <text x="450" y="344" text-anchor="middle" fill="rgba(255,255,255,.65)" font-size="9">whoami · app.localhost</text>
  <line x1="450" y1="288" x2="450" y2="308" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#a-green)"/>

  <!-- Grafana -->
  <rect x="380" y="378" width="140" height="52" rx="9" fill="#1a1d2e" stroke="#ff6b6b" stroke-width="1.2"/>
  <text x="450" y="401" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">Grafana</text>
  <text x="450" y="418" text-anchor="middle" fill="#9ca3af" font-size="9.5">+ Postgres</text>

  <!-- Alertmanager -->
  <rect x="760" y="410" width="140" height="42" rx="8" fill="#1a1d2e" stroke="#ff6b6b" stroke-width="1"/>
  <text x="830" y="436" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="600">Alertmanager</text>
  <path d="M620,60 Q880,60 880,230 Q880,400 830,408" stroke="#ff6b6b" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#a-red)"/>

  <!-- Legend -->
  <rect x="50" y="460" width="10" height="10" rx="2" fill="#6c63ff"/>
  <text x="66" y="469" fill="#9ca3af" font-size="9.5">Federation /federate</text>
  <rect x="210" y="460" width="10" height="10" rx="2" fill="#4a4e6a"/>
  <text x="226" y="469" fill="#9ca3af" font-size="9.5">Scrape targets</text>
  <rect x="350" y="460" width="10" height="10" rx="2" fill="#ffd93d"/>
  <text x="366" y="469" fill="#9ca3af" font-size="9.5">Metrics exposure</text>
  <rect x="500" y="460" width="10" height="10" rx="2" fill="#00d4aa"/>
  <text x="516" y="469" fill="#9ca3af" font-size="9.5">HTTP traffic</text>
  <rect x="620" y="460" width="10" height="10" rx="2" fill="#ff6b6b"/>
  <text x="636" y="469" fill="#9ca3af" font-size="9.5">Alerting</text>
