  <line x1="120" y1="270" x2="120" y2="308" stroke="#4a4e6a" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#a-grey)"/>
  <line x1="200" y1="270" x2="200" y2="308" stroke="#4a4e6a" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#a-grey)"/>
  <line x1="280" y1="270" x2="280" y2="308" stroke="#4a4e6a" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#a-grey)"/>
  <!-- Scrape arrows DC02 -->
  <line x1="680" y1="270" x2="680" y2="308" stroke="#4a4e6a" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#a-grey)"/>
  <line x1="760" y1="270" x2="760" y2="308" stroke="#4a4e6a" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#a-grey)"/>
  <line x1="840" y1="270" x2="840" y2="308" stroke="#4a4e6a" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#a-grey)"/>

