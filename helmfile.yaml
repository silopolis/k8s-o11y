# Helmfile for kube-prometheus-stack deployment
# Phase 1: Core Observability Stack
# Reference: .planning/phases/01-core-observability-stack/01-01-PLAN.md

---

# Helm repositories
repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

# Helm defaults
helmDefaults:
  timeout: 600
  wait: true
  atomic: false
  cleanupOnFail: true

# Releases
releases:
  # Wave 1: Install CRDs first
  # CRDs must exist before the main kube-prometheus-stack chart
  - name: kube-prometheus-stack-crds
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/prometheus-operator-crds
    version: "~11.0.0"  # Latest stable 11.x, allows patch updates
    values:
      - values/kube-prometheus-stack-crds.yaml
    wait: true
    hooks:
      - events: ["postsync"]
        command: "kubectl"
        args:
          - "get"
          - "crd"
          - "-l"
          - "app.kubernetes.io/part-of=prometheus-operator"
      - events: ["postsync"]
        command: "echo"
        args:
          - "CRDs installed successfully. Ready for main stack deployment."

  # Wave 2: Main kube-prometheus-stack
  # Deployed via 01-02-PLAN.md
  - name: kube-prometheus-stack
    namespace: monitoring
    createNamespace: true
    chart: prometheus-community/kube-prometheus-stack
    version: "~82.10.0"  # Match research findings
    needs:
      - kube-prometheus-stack-crds  # Wait for CRDs
    values:
      - values/kube-prometheus-stack.yaml
      - values/prometheus.yaml
      - values/grafana.yaml
      - values/alertmanager.yaml
    wait: true
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args: ["wait", "--for", "condition=Established", "crd", "prometheuses.monitoring.coreos.com", "--timeout", "60s"]
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["wait", "--for", "condition=ready", "pod", "-l", "app.kubernetes.io/name=prometheus", "-n", "monitoring", "--timeout", "300s"]

  # Wave 3: Verification (to be enabled in 01-03-PLAN.md)
  # Post-deployment verification jobs

---

# Helmfile lint configuration
# Run: helmfile lint
